name: Sync Strava to Notion

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests notion-client

      - name: Run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

        run: |
          python <<EOF
          import os
          import requests
          from notion_client import Client

          notion = Client(auth=os.environ["NOTION_TOKEN"])

          # 获取 Strava access token
          auth = requests.post(
              "https://www.strava.com/oauth/token",
              data={
                  "client_id": os.environ["STRAVA_CLIENT_ID"],
                  "client_secret": os.environ["STRAVA_CLIENT_SECRET"],
                  "refresh_token": os.environ["STRAVA_REFRESH_TOKEN"],
                  "grant_type": "refresh_token",
              },
          ).json()

          access_token = auth["access_token"]

          headers = {
              "Authorization": f"Bearer {access_token}"
          }

          # 获取最近活动
          activities = requests.get(
              "https://www.strava.com/api/v3/athlete/activities",
              headers=headers,
              params={"per_page": 5},
          ).json()

          print("ACTIVITIES:", activities)

          for act in activities:

              title = act.get("name", "Untitled")

              distance_km = round(act.get("distance", 0) / 1000, 2)

              elevation = act.get("total_elevation_gain", 0)

              moving_time_sec = act.get("moving_time", 0)

              avg_hr = act.get("average_heartrate", 0)

              activity_type = act.get("sport_type", "Run")

              pace = ""

              if distance_km > 0:
                  sec_per_km = moving_time_sec / distance_km
                  minutes = int(sec_per_km // 60)
                  seconds = int(sec_per_km % 60)
                  pace = f"{minutes}:{seconds:02d}/km"

              hours = moving_time_sec // 3600
              minutes = (moving_time_sec % 3600) // 60
              seconds = moving_time_sec % 60

              duration = f"{hours}h {minutes}m {seconds}s"

              notion.pages.create(
                  parent={
                      "database_id": os.environ["NOTION_DATABASE_ID"]
                  },
                  properties={

                      "标题": {
                          "title": [
                              {
                                  "text": {
                                      "content": title
                                  }
                              }
                          ]
                      },

                      "日期": {
                          "date": {
                              "start": act["start_date_local"]
                          }
                      },

                      "训练类型": {
                          "select": {
                              "name": activity_type
                          }
                      },

                      "距离（km） ": {
                          "number": distance_km
                      },

                      "爬升（m）  ": {
                          "number": elevation
                      },

                      "用时": {
                          "number": moving_time_sec
                      },

                      "平均心率": {
                          "number": avg_hr
                      },

                      "平均配速": {
                          "rich_text": [
                              {
                                  "text": {
                                      "content": pace
                                  }
                              }
                          ]
                      },

                      "Strava Activity ID": {
                          "number": act.get("id", 0)
                      }

                  }
              )

              print(f"Synced: {title}")

          print("Sync complete")
          EOF
